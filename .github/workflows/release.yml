name: DailyCleanUp Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Optional: major, minor, or patch. Defaults to patch'
        required: false
        default: 'patch'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read VERSION
        id: read_version
        run: |
          CURRENT=$(cat VERSION)
          echo "CURRENT=$CURRENT" >> $GITHUB_ENV

      - name: Determine bump type
        id: determine_bump
        run: |
          BUMP="${{ github.event.inputs.bump }}"
          if [[ -z "$BUMP" ]]; then
            BUMP="patch"
          fi
          echo "BUMP_TYPE=$BUMP" >> $GITHUB_ENV

      - name: Bump VERSION
        id: bump
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP_TYPE" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo $NEW_VERSION > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "Bump version to $NEW_VERSION [skip ci]"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Create ZIP
        run: |
          mkdir -p release
          zip -r release/DailyCleanUp-${{ env.NEW_VERSION }}.zip . -x "*.git*" -x "release/*"

      - name: Compute SHA-256
        id: sha
        run: |
          HASH=$(sha256sum release/DailyCleanUp-${{ env.NEW_VERSION }}.zip | awk '{print $1}')
          echo "HASH=$HASH" >> $GITHUB_ENV

      - name: Create GitHub Release
        run: |
          gh release create ${{ env.NEW_VERSION }} \
            release/DailyCleanUp-${{ env.NEW_VERSION }}.zip \
            --generate-notes \
            --title "DailyCleanUp ${{ env.NEW_VERSION }}" \
            --draft=false \
            --prerelease=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add SHA-256 to Release Notes
        run: |
          BODY=$(gh release view ${{ env.NEW_VERSION }} --json body -q .body)
          NEW_BODY="$BODY\n\n**SHA-256:** `${{ env.HASH }}`"
          gh release edit ${{ env.NEW_VERSION }} --notes "$NEW_BODY"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
