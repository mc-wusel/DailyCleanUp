name: DailyCleanUp Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Optional: major, minor, or patch. Defaults to patch'
        required: false
        default: 'patch'

jobs:
  version-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read VERSION
        id: read_version
        run: |
          CURRENT=$(cat VERSION)
          echo "CURRENT=$CURRENT" >> $GITHUB_ENV

      - name: Determine bump type
        id: determine_bump
        run: |
          BUMP="${{ github.event.inputs.bump }}"
          if [[ -z "$BUMP" ]]; then BUMP="patch"; fi
          echo "BUMP_TYPE=$BUMP" >> $GITHUB_ENV

      - name: Bump VERSION and create PR branch
        id: bump
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP_TYPE" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo $NEW_VERSION > VERSION
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="bump-$NEW_VERSION"
          git checkout -b $BRANCH
          git add VERSION
          git commit -m "Bump version to $NEW_VERSION [skip ci]"
          git push origin $BRANCH

          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Create Pull Request
        run: |
          gh pr create \
            --title "Bump version to ${{ env.NEW_VERSION }}" \
            --body "Automated version bump for release" \
            --base main \
            --head ${{ env.BRANCH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: version-bump
    runs-on: ubuntu-latest
    #if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read merged VERSION
        id: read_version
        run: |
          NEW_VERSION=$(cat VERSION)
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Create ZIP
        run: |
          mkdir -p release
          zip -r release/DailyCleanUp-${{ env.NEW_VERSION }}.zip . -x "*.git*" -x "release/*"

      - name: Compute SHA-256
        id: sha
        run: |
          HASH=$(sha256sum release/DailyCleanUp-${{ env.NEW_VERSION }}.zip | awk '{print $1}')
          echo "HASH=$HASH" >> $GITHUB_ENV

      - name: Create GitHub Release
        run: |
          gh release create ${{ env.NEW_VERSION }} \
            release/DailyCleanUp-${{ env.NEW_VERSION }}.zip \
            --generate-notes \
            --title "DailyCleanUp ${{ env.NEW_VERSION }}" \
            --draft=false \
            --prerelease=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add SHA-256 to Release Notes
        run: |
          BODY=$(gh release view ${{ env.NEW_VERSION }} --json body -q .body)
          NEW_BODY="$BODY\n\n**SHA-256:** ${{ env.HASH }}"
          gh release edit ${{ env.NEW_VERSION }} --notes "$NEW_BODY"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
